# 개발용 설정 — 본 인스턴스(8777/5607) 옆에서 충돌 없이 실행
#   RS50_CONFIG=config.dev.toml python -m src.main --monitor
#   RS50_CONFIG=config.dev.toml python tools/demo_telemetry.py 30

[telemetry]
port = 5608

[shift_keys]
up = "e"
down = "q"
press_ms = 30
focus_guard = "__dev_never_match__"  # 개발 인스턴스는 절대 키 인젝션 금지

[override]
timeout_s = 7.0
hold_to_auto_s = 2.0
reverse_max_kmh = 15

[auto]
upshift_ratio = 0.90
downshift_ratio = 0.35
min_shift_interval_s = 0.6
max_gear = 8

[led]
preset = "f1"
mode = "shift"
start_ratio = 0.5
blink_ratio = 0.88
blink_hz = 0
update_hz = 5
fast_updates = true
race_leds = false

[web]
enabled = true
port = 8778
host = "127.0.0.1"
